[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.ctype", "php84Extensions.curl", "php84Extensions.dom", "php84Extensions.fileinfo", "php84Extensions.mbstring", "php84Extensions.pdo", "php84Extensions.pdo_pgsql", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.openssl", "nodejs_22"]

[phases.install]
cmds = [
  "composer install --optimize-autoloader --no-dev --no-interaction",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache",
  "chmod -R a+rw storage bootstrap/cache"
]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
